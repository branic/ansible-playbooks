---
ansible-navigator:
  editor:
    command: code -g {filename}:{line_number}
    console: false
  playbook-artifact:
    enable: false
    save-as: "{playbook_dir}/run-artifacts/{playbook_name}-artifact-{time_stamp}.json"
  execution-environment:
    image: quay.io/branic/ansible-ee:latest
    pull:
      policy: missing
  ansible:
    inventory:
      entries:
        - "./inventory/inventory.yml"
  mode: stdout
